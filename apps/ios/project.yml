name: Kairos
options:
  bundleIdPrefix: com.kairos
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

configs:
  Debug: debug
  Release: release

settings:
  base:
    SWIFT_VERSION: 5.10
    CODE_SIGN_STYLE: Automatic
    CODE_SIGNING_REQUIRED: NO
    CODE_SIGNING_ALLOWED: NO
    ENABLE_PREVIEWS: YES

packages:
  BandDeriver:
    path: Packages/BandDeriver
  FirebaseAuth:
    url: https://github.com/firebase/firebase-ios-sdk
    from: 11.0.0
  FirebaseCore:
    url: https://github.com/firebase/firebase-ios-sdk
    from: 11.0.0
  GoogleSignIn:
    url: https://github.com/google/GoogleSignIn-iOS
    from: 8.0.0

targets:
  Kairos:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Kairos
    # Issue #71 (docs/14_IMPROVEMENT_REVIEW.md §1.9): no .entitlements file
    # existed at all — on any real signed device build, HealthKit
    # authorization fails outright (the OS refuses every read-authorization
    # request without this entitlement) and the app would have silently
    # uploaded fabricated neutral bands forever (compounding the separate
    # consent-enforcement gap, issue #70). `CODE_SIGNING_ALLOWED: NO`
    # (this project's default, see `settings.base` above) never actually
    # code-signs using this file, so referencing it here does not affect
    # unsigned simulator/CI builds at all — it only takes effect once a real
    # signing identity/team is configured for a device build.
    entitlements:
      path: Kairos/Kairos.entitlements
      properties:
        com.apple.developer.healthkit: true
        # Keychain Sharing — required by Firebase Auth, which keychains the
        # signed-in session after every sign-in (Google/Apple/email). Without
        # it a code-signed build hits errSecMissingEntitlement (-34018),
        # surfaced in-app as "Network problem: keychain error".
        keychain-access-groups:
          - $(AppIdentifierPrefix)com.kairos.devotional
    info:
      path: Kairos/Info.plist
      properties:
        UILaunchScreen: {}
        # The API base URL, read at runtime by `AppEnvironment.apiBaseURL`.
        # Uses Info.plist variable substitution: Xcode expands `$(API_BASE_URL)`
        # from the build setting of the same name (see `settings.base` below)
        # when it processes the Info.plist. NOTE: a custom
        # `INFOPLIST_KEY_API_BASE_URL` build setting does NOT work here —
        # Xcode's GENERATE_INFOPLIST_FILE machinery only synthesizes a fixed
        # allowlist of Apple-known INFOPLIST_KEY_* keys and silently drops
        # arbitrary custom ones. The `$(VAR)` reference is the mechanism that
        # actually lands the value in the built Info.plist.
        API_BASE_URL: "$(API_BASE_URL)"
        # Product/brand name shown under the app icon and in system UI.
        # The target, bundle id, and module stay "kairos" (internal codename);
        # only the user-facing name is Wellspring, matching the web app.
        CFBundleDisplayName: Wellspring
        NSCalendarsUsageDescription: "Kairos reads when you're free or busy to place your devotional in a quiet gap. Event titles, attendees, and notes are never read."
        NSCalendarsFullAccessUsageDescription: "Kairos reads when you're free or busy to place your devotional in a quiet gap. Event titles, attendees, and notes are never read."
        NSHealthShareUsageDescription: "Kairos turns your recovery, sleep, and activity into three simple words on your phone. Raw health data never leaves your device."
        ITSAppUsesNonExemptEncryption: false
        UIBackgroundModes:
          - fetch
          - processing
        BGTaskSchedulerPermittedIdentifiers:
          - com.kairos.devotional.bandRefresh
        # OAuth callback URL schemes. Kept here (not hand-edited into the
        # generated Info.plist) so XcodeGen regeneration can't drop them.
        # These are native-client OAuth identifiers, not secrets — they ship
        # in every app binary. Two distinct entries on purpose: `kairos` is
        # our own callback for the Google *Calendar* OAuth flow (#124), while
        # the reversed-client-id scheme is Google Sign-In's callback (#190).
        # Signing in must never imply calendar access (Foundation §8), and
        # different OAuth clients back each one.
        CFBundleURLTypes:
          - CFBundleURLName: com.kairos.devotional.oauth
            CFBundleURLSchemes:
              - kairos
          - CFBundleURLName: com.kairos.devotional.googlesignin
            CFBundleURLSchemes:
              - com.googleusercontent.apps.382100412938-816ee8lagi2o104197l9tdfkboccvd91
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.kairos.devotional
        TARGETED_DEVICE_FAMILY: "1"
        GENERATE_INFOPLIST_FILE: YES
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_EMIT_LOC_STRINGS: YES
        # Issue #71 (docs/14_IMPROVEMENT_REVIEW.md §1.9): the single
        # configuration point for the API base URL. The generated Info.plist
        # holds `API_BASE_URL = $(API_BASE_URL)` (see `info.properties` above),
        # and Xcode expands this build setting into it at build time —
        # `AppEnvironment.apiBaseURL` then reads the `API_BASE_URL` Info.plist
        # key. Left EMPTY here on purpose: an empty value makes
        # `AppEnvironment.apiBaseURL` fall through to its `#if DEBUG` staging
        # fallback (so local/simulator dev works with no setup) and, in a
        # Release build, to a non-routable `.invalid` host (fail-closed —
        # never silently reaches an unintended host). Set a real value in a
        # per-config override below (or locally) once a production API exists.
        API_BASE_URL: ""
      configs:
        debug:
          # Local Debug: adhoc-sign the simulator build (identity "-") with
          # MANUAL style so the entitlements file (keychain-access-groups
          # above) is embedded verbatim — NO Apple provisioning profile
          # needed. A free personal team can't provision keychain-sharing, and
          # AUTOMATIC signing silently STRIPS the entitlement and falls back to
          # entitlement-less adhoc — which is exactly what caused Firebase
          # Auth's keychain write to fail with -34018 ("keychain error").
          # $(AppIdentifierPrefix) resolves empty under adhoc, so the group is
          # just "com.kairos.devotional" — valid on the simulator; Firebase
          # uses it as the default access group. CI stays fully unsigned
          # because apple-ci passes CODE_SIGNING_ALLOWED=NO on the xcodebuild
          # command line, which overrides this target-level setting.
          CODE_SIGNING_ALLOWED: YES
          CODE_SIGN_STYLE: Manual
          CODE_SIGN_IDENTITY: "-"
    dependencies:
      - package: BandDeriver
      - package: FirebaseAuth
        product: FirebaseAuth
      - package: FirebaseCore
        product: FirebaseCore
      - package: GoogleSignIn
        product: GoogleSignIn

  KairosTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: KairosTests
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: Kairos

  KairosUITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: KairosUITests
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: Kairos

schemes:
  Kairos:
    build:
      targets:
        Kairos: all
        KairosTests: [test]
        KairosUITests: [test]
    test:
      targets:
        - KairosTests
        - KairosUITests
    run:
      config: Debug
