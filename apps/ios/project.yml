name: Kairos
options:
  bundleIdPrefix: com.kairos
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

configs:
  Debug: debug
  Release: release

settings:
  base:
    SWIFT_VERSION: 5.10
    CODE_SIGN_STYLE: Automatic
    CODE_SIGNING_REQUIRED: NO
    CODE_SIGNING_ALLOWED: NO
    ENABLE_PREVIEWS: YES

packages:
  BandDeriver:
    path: Packages/BandDeriver
  FirebaseAuth:
    url: https://github.com/firebase/firebase-ios-sdk
    from: 11.0.0
  FirebaseCore:
    url: https://github.com/firebase/firebase-ios-sdk
    from: 11.0.0

targets:
  Kairos:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Kairos
    # Issue #71 (docs/14_IMPROVEMENT_REVIEW.md §1.9): no .entitlements file
    # existed at all — on any real signed device build, HealthKit
    # authorization fails outright (the OS refuses every read-authorization
    # request without this entitlement) and the app would have silently
    # uploaded fabricated neutral bands forever (compounding the separate
    # consent-enforcement gap, issue #70). `CODE_SIGNING_ALLOWED: NO`
    # (this project's default, see `settings.base` above) never actually
    # code-signs using this file, so referencing it here does not affect
    # unsigned simulator/CI builds at all — it only takes effect once a real
    # signing identity/team is configured for a device build.
    entitlements:
      path: Kairos/Kairos.entitlements
      properties:
        com.apple.developer.healthkit: true
    info:
      path: Kairos/Info.plist
      properties:
        UILaunchScreen: {}
        NSCalendarsUsageDescription: "Kairos reads when you're free or busy to place your devotional in a quiet gap. Event titles, attendees, and notes are never read."
        NSCalendarsFullAccessUsageDescription: "Kairos reads when you're free or busy to place your devotional in a quiet gap. Event titles, attendees, and notes are never read."
        NSHealthShareUsageDescription: "Kairos turns your recovery, sleep, and activity into three simple words on your phone. Raw health data never leaves your device."
        ITSAppUsesNonExemptEncryption: false
        UIBackgroundModes:
          - fetch
          - processing
        BGTaskSchedulerPermittedIdentifiers:
          - com.kairos.devotional.bandRefresh
        # OAuth callback URL schemes. Kept here (not hand-edited into the
        # generated Info.plist) so XcodeGen regeneration can't drop them.
        # These are native-client OAuth identifiers, not secrets — they ship
        # in every app binary. Two distinct entries on purpose: `kairos` is
        # our own callback for the Google *Calendar* OAuth flow (#124), while
        # the reversed-client-id scheme is Google Sign-In's callback (#190).
        # Signing in must never imply calendar access (Foundation §8), and
        # different OAuth clients back each one.
        CFBundleURLTypes:
          - CFBundleURLName: com.kairos.devotional.oauth
            CFBundleURLSchemes:
              - kairos
          - CFBundleURLName: com.kairos.devotional.googlesignin
            CFBundleURLSchemes:
              - com.googleusercontent.apps.382100412938-816ee8lagi2o104197l9tdfkboccvd91
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.kairos.devotional
        TARGETED_DEVICE_FAMILY: "1"
        GENERATE_INFOPLIST_FILE: YES
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_EMIT_LOC_STRINGS: YES
      # Issue #71 (docs/14_IMPROVEMENT_REVIEW.md §1.9): the single
      # configuration point for the API base URL — `AppEnvironment.apiBaseURL`
      # reads this via `INFOPLIST_KEY_API_BASE_URL` (which xcodegen/Xcode's
      # GENERATE_INFOPLIST_FILE mechanism bakes into the built Info.plist's
      # `API_BASE_URL` key automatically). Debug points at the real,
      # currently-deployed staging host so local/simulator/CI builds work
      # out of the box; Release is deliberately left unset here so an
      # unconfigured Release-shaped build fails closed to
      # `AppEnvironment.apiBaseURL`'s non-routable `.invalid` fallback
      # rather than silently reaching any host — a real Release/TestFlight
      # build must set this explicitly once a real production API exists.
      configs:
        debug:
          INFOPLIST_KEY_API_BASE_URL: https://your-api-host.example.com
    dependencies:
      - package: BandDeriver
      - package: FirebaseAuth
        product: FirebaseAuth
      - package: FirebaseCore
        product: FirebaseCore

  KairosTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: KairosTests
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: Kairos

  KairosUITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: KairosUITests
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: Kairos

schemes:
  Kairos:
    build:
      targets:
        Kairos: all
        KairosTests: [test]
        KairosUITests: [test]
    test:
      targets:
        - KairosTests
        - KairosUITests
    run:
      config: Debug
