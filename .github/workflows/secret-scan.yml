name: Secret Scan
# Split out of ci.yml so it runs on EVERY pull request, including
# docs-only ones that ci.yml skips via `paths-ignore`.
#
# Why it must not be path-filtered: a credential can land in a markdown
# example, a runbook, or a config snippet just as easily as in source —
# and this repo's docs are full of config examples. Path-filtering the
# scanner would create exactly the gap it exists to close.
#
# It is also the cheapest job in the matrix (~11s), so running it
# unconditionally costs almost nothing next to the suite in ci.yml.
#
# No `push: [main]` trigger, for the same reason as ci.yml: the PR run
# already scanned these commits and a squash-merge introduces no new ones.
on:
  pull_request:
  workflow_dispatch: {}

concurrency:
  group: secret-scan-${{ github.ref }}
  cancel-in-progress: true

jobs:
  secret-scan:
    runs-on: ubuntu-latest
    # gitleaks-action lists the PR's commits via the API on `pull_request`
    # events (to scan only the new commits, not full history) — needs
    # `pull-requests: read`, which the default GITHUB_TOKEN doesn't grant.
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - uses: gitleaks/gitleaks-action@v2
        env: { GITHUB_TOKEN: "${{ secrets.GITHUB_TOKEN }}" }
