name: Apple CI
# Builds and runs the iOS unit + UI tests on a simulator (unsigned — there is
# no TestFlight/App Store upload here). This is a public repo, so macOS
# runners are free; unlike the origin repo (where a spending cap forced
# manual-only runs) this now runs automatically on any change under
# `apps/ios/**`, plus on demand via the Actions tab or `gh workflow run "Apple CI"`.
#
# The Xcode project is GENERATED from `apps/ios/project.yml` with XcodeGen at
# the start of every run, so the checked-in `.xcodeproj` can never drift out
# of sync with the files on disk (a file added to the tree but not the project
# is what previously broke the build — issue #223). project.yml is the single
# source of truth.
on:
  pull_request:
    paths:
      - "apps/ios/**"
      - ".github/workflows/apple-ci.yml"
  workflow_dispatch: {}

# Cancel a superseded run instead of letting it finish once a newer commit
# lands on the same branch/PR.
concurrency:
  group: apple-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ios-test:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Install XcodeGen
        run: brew install xcodegen
      - name: Generate Xcode project from project.yml (single source of truth)
        run: cd apps/ios && xcodegen generate
      - name: iOS unit + UI tests (simulator, unsigned)
        run: |
          xcodebuild test \
            -project apps/ios/Kairos.xcodeproj \
            -scheme Kairos \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=latest' \
            CODE_SIGNING_ALLOWED=NO
